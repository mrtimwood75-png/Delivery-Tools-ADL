<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment cancelled</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      color: #111111;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 460px;
      text-align: center;
    }

    .logo {
      width: 180px;
      max-width: 70%;
      height: auto;
      margin-bottom: 42px;
    }

    h1 {
      font-size: 32px;
      line-height: 1.15;
      margin: 0 0 16px 0;
      font-weight: 700;
    }

    p {
      font-size: 17px;
      line-height: 1.5;
      margin: 0;
      color: #333333;
    }

    .close {
      margin-top: 34px;
      padding-top: 24px;
      border-top: 1px solid #dddddd;
      color: #666666;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="files/BCLOGO.jpg" alt="BoConcept">
    <h1>Payment cancelled</h1>
    <p>No payment was processed.</p>
    <div class="close">You may now close this page.</div>
  </main>
</body>
</html>
